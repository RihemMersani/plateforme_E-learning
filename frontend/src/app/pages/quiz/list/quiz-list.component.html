<div class="page">
  <header class="page-header">
    <div>
      <p class="eyebrow">Quiz</p>
      <h1>Teste tes connaissances</h1>
      <p class="subtitle">Les quiz viennent maintenant de MySQL.</p>
    </div>
    <button class="primary" routerLink="/cours">Voir les cours</button>
  </header>

  <p *ngIf="loading">Chargement des quiz...</p>

  <section class="quiz-grid" *ngIf="!loading">
    <article class="quiz-card" *ngFor="let quiz of quizzes; let index = index" [style.--delay.s]="index * 0.08">
      <div class="quiz-meta">Cours: {{ quiz.course_title }}</div>
      <h3>{{ quiz.title }}</h3>
      <p>{{ quiz.questions_count }} questions - score requis {{ quiz.passing_score }}%</p>
      <div class="actions">
        <button class="secondary" [routerLink]="['/quiz', quiz.slug]">Commencer</button>
        <button class="ghost" [routerLink]="['/quiz', quiz.slug, 'resultat']">Voir resultat</button>
      </div>
    </article>
  </section>
</div>
