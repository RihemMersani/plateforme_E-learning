<div class="page" *ngIf="quiz && currentQuestion">
  <header class="quiz-header">
    <a class="back" routerLink="/quiz">Retour aux quiz</a>
    <div>
      <h1>{{ quiz.title }}</h1>
      <p>Question {{ currentIndex + 1 }} sur {{ quiz.questions.length }}</p>
    </div>
    <div class="timer">{{ quiz.passing_score }}% requis</div>
  </header>

  <section class="question-card">
    <h2>{{ currentQuestion.question_text }}</h2>
    <div class="answers">
      <label class="answer" *ngFor="let answer of currentQuestion.answers">
        <input type="radio" [name]="'q' + currentQuestion.id" [value]="answer.id" [(ngModel)]="answers[currentQuestion.id]" />
        <span>{{ answer.answer_text }}</span>
      </label>
    </div>
    <p *ngIf="errorMessage">{{ errorMessage }}</p>
    <div class="quiz-actions">
      <button class="ghost" (click)="previous()" [disabled]="currentIndex === 0">Question precedente</button>
      <button class="primary" (click)="next()">
        {{ currentIndex === quiz.questions.length - 1 ? 'Soumettre' : 'Question suivante' }}
      </button>
    </div>
  </section>
</div>
