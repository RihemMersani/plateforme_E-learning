<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <span class="auth-badge">Inscription</span>
      <h1>Bienvenue !</h1>
      <p>Cree ton compte pour commencer ton parcours.</p>
    </div>

    <form class="auth-form" [formGroup]="registerForm" (ngSubmit)="onRegister()">
      <div class="split">
        <label>
          Prénom
          <input type="text" placeholder="Prénom" formControlName="firstName" />
        </label>
        <label>
          Nom
          <input type="text" placeholder="Nom" formControlName="lastName" />
        </label>
      </div>
      <label>
        Email
        <input type="email" placeholder="toi@email.com" formControlName="email" />
      </label>
      <label>
        Mot de passe
        <input type="password" placeholder="********" formControlName="password" />
      </label>
      <label>
        Confirmer le mot de passe
        <input type="password" placeholder="********" formControlName="passwordConfirm" />
      </label>
      <div *ngIf="registerForm.errors?.['passwordsMismatch'] && (registerForm.get('passwordConfirm')?.touched || registerForm.get('passwordConfirm')?.dirty)" class="error-message">
        Les mots de passe ne correspondent pas.
      </div>
      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>
      <button class="primary" type="submit" [disabled]="registerForm.invalid">Creer un compte</button>
    </form>

    <div class="auth-footer">
      <span>Deja un compte ?</span>
      <a class="link" routerLink="/login">Se connecter</a>
    </div>
  </div>

  <div class="auth-side">
    <div class="side-card">
      <h2>Un espace clair</h2>
      <p>Accede a tes cours, quiz et certificats en un clin d'oeil.</p>
      <div class="side-pill">Progression visuelle et douce</div>
    </div>
  </div>
</div>
