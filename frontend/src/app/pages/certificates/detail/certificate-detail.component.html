<div class="page">
  <a class="back" routerLink="/certificats">Retour aux certificats</a>

  <section class="certificate" *ngIf="certificate">
    <div class="badge">Certificat officiel</div>
    <h1>Certificat d'achevement</h1>
    <p class="name">Delivre a <strong>{{ certificate.full_name }}</strong></p>
    <p class="course">Pour le cours <strong>{{ certificate.title }}</strong></p>
    <div class="divider"></div>
    <p class="date">{{ certificate.issued_at | date:'mediumDate' }}</p>
  </section>

  <section class="certificate" *ngIf="message">
    <h1>{{ message }}</h1>
    <p>Termine le cours pour debloquer ce certificat.</p>
  </section>
</div>
