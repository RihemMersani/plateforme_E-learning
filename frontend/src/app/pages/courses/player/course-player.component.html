<div class="page" *ngIf="course && activeLesson">
  <header class="player-header">
    <a class="back" [routerLink]="['/cours', course.slug]">Retour au detail</a>
    <div>
      <h1>{{ course.title }}</h1>
      <p>{{ activeLesson.title }}</p>
    </div>
    <button class="secondary" [routerLink]="['/cours', course.slug, 'progression']">Voir progression</button>
  </header>

  <section class="player-grid">
    <div class="video">
      <div class="video-surface">
        <span>{{ activeLesson.video_url ? 'Video du cours' : 'Lecon texte' }}</span>
      </div>
      <div class="video-info">
        <h2>{{ activeLesson.title }}</h2>
        <p>{{ activeLesson.content }}</p>
        <div class="resource-row">
          <button class="ghost" *ngIf="activeLesson.document_url">Telecharger PDF</button>
          <button class="ghost" routerLink="/quiz">Ouvrir quiz</button>
        </div>
        <p *ngIf="message">{{ message }}</p>
      </div>
    </div>
    <aside class="chapters">
      <h3>Lecons</h3>
      <ul>
        <li *ngFor="let lesson of lessons" [class.active]="lesson.id === activeLesson.id" (click)="selectLesson(lesson)">
          {{ lesson.title }} - {{ lesson.duration_minutes }} min
        </li>
      </ul>
      <button class="primary" (click)="completeLesson()">Marquer comme termine</button>
    </aside>
  </section>
</div>
