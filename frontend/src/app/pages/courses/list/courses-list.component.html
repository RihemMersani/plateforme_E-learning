<div class="page">
  <header class="page-header">
    <div>
      <p class="eyebrow">Cours</p>
      <h1>Trouve un cours qui te ressemble</h1>
      <p class="subtitle">Des parcours connectes a ta base MySQL XAMPP.</p>
    </div>
    <button class="primary" routerLink="/inscription">Commencer</button>
  </header>

  <section class="filters">
    <label>
      Recherche
      <input type="text" placeholder="Angular, Node, JavaScript..." [(ngModel)]="search" />
    </label>
    <label>
      Niveau
      <select [(ngModel)]="level">
        <option>Tous</option>
        <option>Debutant</option>
        <option>Intermediaire</option>
        <option>Avance</option>
      </select>
    </label>
  </section>

  <p *ngIf="loading">Chargement des cours...</p>

  <section class="course-grid" *ngIf="!loading">
    <article class="course-card" *ngFor="let course of filteredCourses; let index = index" [style.--delay.s]="index * 0.08">
      <div class="cover" [style.background-image]="'url(' + course.image + ')'"></div>
      <div class="content">
        <div class="meta">{{ course.level }} - {{ course.duration_minutes }} min - {{ course.lessons_count }} lecons</div>
        <h3>{{ course.title }}</h3>
        <p>{{ course.description }}</p>
        <div class="actions">
          <button class="secondary" [routerLink]="['/cours', course.slug]">Voir details</button>
          <button class="ghost">{{ course.price > 0 ? (course.price + ' DT') : 'Gratuit' }}</button>
        </div>
      </div>
    </article>
  </section>
</div>
