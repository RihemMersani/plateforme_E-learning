<section class="panel">
  <h2>Mes cours</h2>
  <div class="course-grid">
    <article class="course-card" *ngFor="let course of courses">
      <div class="cover" [style.background-image]="'url(' + course.image + ')'"></div>
      <div class="content">
        <h3>{{ course.title }}</h3>
        <p>Progression {{ course.progress }}%</p>
        <button class="secondary" [routerLink]="['/cours', course.slug, 'progression']">Voir progression</button>
      </div>
    </article>
  </div>
  <p *ngIf="courses.length === 0">Tu n'es inscrit a aucun cours.</p>
</section>
