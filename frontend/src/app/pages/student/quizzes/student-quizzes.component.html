<section class="panel">
  <h2>Mes quiz</h2>
  <div class="quiz-list">
    <div class="quiz-item" *ngFor="let quiz of quizzes">
      <div>
        <h3>{{ quiz.title }}</h3>
        <p>Score: {{ quiz.score }}% - {{ quiz.passed ? 'valide' : 'a revoir' }}</p>
      </div>
      <button class="ghost" [routerLink]="['/quiz', quiz.slug, 'resultat']">Voir resultat</button>
    </div>
  </div>
  <p *ngIf="quizzes.length === 0">Aucun quiz soumis pour le moment.</p>
</section>
