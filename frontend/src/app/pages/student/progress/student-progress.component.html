<section class="panel">
  <h2>Mes progres</h2>
  <div class="progress-list">
    <div class="progress-item" *ngFor="let course of courses">
      <div>
        <h3>{{ course.title }}</h3>
        <p>Progression {{ course.progress }}%</p>
      </div>
      <div class="bar"><span [style.width.%]="course.progress"></span></div>
    </div>
  </div>
  <p *ngIf="courses.length === 0">Aucune progression pour le moment.</p>
</section>
