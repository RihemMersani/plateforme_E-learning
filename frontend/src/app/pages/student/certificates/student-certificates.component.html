<section class="panel">
  <h2>Mes certificats</h2>
  <div class="certificate-list">
    <div class="certificate-item" *ngFor="let certificate of certificates">
      <div>
        <h3>{{ certificate.title }}</h3>
        <p>Valide le {{ certificate.issued_at | date:'mediumDate' }}</p>
      </div>
      <button class="secondary" [routerLink]="['/certificats', certificate.slug]">Ouvrir</button>
    </div>
  </div>
  <p *ngIf="certificates.length === 0">Aucun certificat pour le moment.</p>
</section>
